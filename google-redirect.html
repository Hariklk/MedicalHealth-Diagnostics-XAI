<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting | Medical Portal</title>
    <meta name="description" content="Secure redirection to authentication provider.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .redirect-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        body.light-theme .redirect-loader {
            color: #0f172a;
        }

        .spinner-ring {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(14, 165, 233, 0.3);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .redirect-text h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .redirect-text p {
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="medical-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <main class="login-wrapper">
        <div class="login-card" style="padding: 60px 40px;">
            <div class="redirect-loader">
                <div class="spinner-ring"></div>
                <div class="redirect-text">
                    <h2>Connecting to Google</h2>
                    <p>Redirecting you to the secure provider...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Theme Initialization
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        // Redirect after 2.5 seconds to simulate a secure handshake
        setTimeout(() => {
            window.location.href = 'https://accounts.google.com/signin';
        }, 2500);
    </script>
</body>

</html>
